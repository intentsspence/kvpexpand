name: CI

on:
  push:
    branches:
      - main
  pull_request:
  
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
      
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Check code formatting with black
        run: tox -e format

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
      
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Check code linting with flake8
        run: tox -e lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
      
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Check type annotations with mypy
        run: tox -e typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements_dev.txt
      
      - name: Run tox test recpie
        run: tox -e py${{ matrix.python-version }}

      - name: Check for coverage file
        run: |
          ls -la
          ls -l .coverage.py${{ matrix.python-version }}

      - name: Upload code coverage results
        uses: actions/upload-artifact@v6
        with:
          name: intermediate-coverage-${{ matrix.python-version }}
          path: .coverage.py${{ matrix.python-version }}
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true
  
  report-coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
      
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage

      - name: Download intermediate coverage results
        uses: actions/download-artifact@v4
        with:
          pattern: intermediate-coverage-*
          merge-multiple: true

      - name: Generate combined coverage report
        run: |
          coverage combine .coverage.*
          coverage report -m --fail-under=95
          coverage xml -o coverage.xml
          coverage html
        
      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: code-coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: error
